name: Daily Bounce Extract

on:
  schedule:
    # Runs alongside Daily Lead Extract. GitHub's scheduler frequently delays
    # or drops cron runs under load, so we add staggered backups at odd
    # minutes. This job dedups bounces against the sheet, so a later attempt
    # that finds nothing new is harmless.
    - cron: "7 4 * * *"   # 04:07 UTC ~ 09:37 IST (primary)
    - cron: "23 6 * * *"  # 06:23 UTC ~ 11:53 IST (backup 1)
    - cron: "43 8 * * *"  # 08:43 UTC ~ 14:13 IST (backup 2)
  workflow_dispatch: {}

# Only one run at a time, so overlapping cron attempts can't double-append.
concurrency:
  group: daily-bounce-extract
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Run bounce extraction
        env:
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          BOUNCE_GOOGLE_SHEET_ID: ${{ secrets.BOUNCE_GOOGLE_SHEET_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node pipeline/bounce-extract.mjs
