name: Daily Lead Extract

on:
  schedule:
    # Primary target ~10:00 AM IST. GitHub's scheduler frequently delays or
    # drops cron runs under load, so we add staggered backups at odd minutes.
    # The job is watermark-idempotent (a later run finds no new contacts and
    # no-ops) and the concurrency group below prevents overlap, so at most one
    # attempt actually does work.
    - cron: "7 4 * * *"   # 04:07 UTC ~ 09:37 IST (primary)
    - cron: "23 6 * * *"  # 06:23 UTC ~ 11:53 IST (backup 1)
    - cron: "43 8 * * *"  # 08:43 UTC ~ 14:13 IST (backup 2)
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run in backfill mode (re-process all events, dedup against sheet)"
        type: boolean
        default: false

# Only one run at a time. New manual runs wait for scheduled runs to finish.
concurrency:
  group: daily-lead-extract
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Run daily extraction
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node pipeline/daily-extract.mjs ${{ inputs.backfill && '--backfill' || '' }}
