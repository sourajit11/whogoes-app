<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Major commercial real estate events by attendance in 2025, with ICSC Las Vegas the largest">
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="28" y="34" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827">Largest commercial real estate events by attendance</text>
  <text x="28" y="56" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280">Approximate attendance, 2025 editions</text>
  <line x1="190" y1="72" x2="190" y2="252" stroke="#e5e7eb" stroke-width="1"/>

  <text x="180" y="103" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">ICSC Las Vegas</text>
  <rect x="190" y="86" width="480" height="26" rx="2" fill="#b45309"/>
  <text x="678" y="105" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">25,000+</text>

  <text x="180" y="161" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">MIPIM (Cannes)</text>
  <rect x="190" y="144" width="384" height="26" rx="2" fill="#d97706"/>
  <text x="582" y="163" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">20,000+</text>

  <text x="180" y="219" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">ICSC New York</text>
  <rect x="190" y="202" width="154" height="26" rx="2" fill="#f59e0b"/>
  <text x="352" y="221" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">~8,000</text>

  <text x="28" y="284" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">ICSC Las Vegas is the single largest retail real estate gathering on the calendar, ahead of MIPIM and triple the size of ICSC New York.</text>
  <text x="28" y="306" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af">Source: organizer and industry figures for the 2025 editions (ICSC, MIPIM / CoStar, Colliers).</text>
</svg>
