<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-label="Hannover Messe on-site visitor numbers by year, 2023 to 2026">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="28" y="34" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827">Hannover Messe visitor numbers by year</text>
  <text x="28" y="56" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280">On-site visitors across the 2023 to 2026 editions</text>
  <line x1="120" y1="72" x2="120" y2="300" stroke="#e5e7eb" stroke-width="1"/>

  <text x="110" y="103" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">2023</text>
  <rect x="120" y="88" width="450" height="24" rx="2" fill="#059669"/>
  <text x="578" y="106" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">130,000</text>

  <text x="110" y="159" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">2024</text>
  <rect x="120" y="144" width="426" height="24" rx="2" fill="#10b981"/>
  <text x="554" y="162" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">123,000</text>

  <text x="110" y="215" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">2025</text>
  <rect x="120" y="200" width="440" height="24" rx="2" fill="#10b981"/>
  <text x="568" y="218" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">127,000</text>

  <text x="110" y="271" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">2026</text>
  <rect x="120" y="256" width="381" height="24" rx="2" fill="#34d399"/>
  <text x="509" y="274" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">110,000</text>

  <text x="28" y="332" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af">Source: Deutsche Messe after-show reports, 2023 to 2026 editions. Exhibitor count held near 4,000 across all four years.</text>
</svg>
