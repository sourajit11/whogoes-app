<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="Inter, system-ui, sans-serif">
  <rect width="600" height="350" fill="#f9fafb" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Dreamforce In-Person Attendance (2019-2026)</text>

  <!-- Y axis -->
  <line x1="80" y1="50" x2="80" y2="280" stroke="#cbd5e1" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="280" x2="560" y2="280" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="72" y="285" text-anchor="end" font-size="11" fill="#64748b">0</text>
  <text x="72" y="227" text-anchor="end" font-size="11" fill="#64748b">50K</text>
  <text x="72" y="170" text-anchor="end" font-size="11" fill="#64748b">100K</text>
  <text x="72" y="112" text-anchor="end" font-size="11" fill="#64748b">150K</text>
  <text x="72" y="55" text-anchor="end" font-size="11" fill="#64748b">200K</text>

  <!-- Grid lines -->
  <line x1="80" y1="222" x2="560" y2="222" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="165" x2="560" y2="165" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="107" x2="560" y2="107" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Bars: 2019=170K, 2022=30K, 2023=~35K, 2024=45K, 2025=40K, 2026=40K+ -->
  <!-- 2019 -->
  <rect x="105" y="84" width="55" height="196" fill="#0176d3" rx="3"/>
  <text x="132" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#0176d3">170K</text>
  <text x="132" y="300" text-anchor="middle" font-size="11" fill="#475569">2019</text>

  <!-- 2022 -->
  <rect x="185" y="245" width="55" height="35" fill="#0176d3" rx="3"/>
  <text x="212" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#0176d3">30K</text>
  <text x="212" y="300" text-anchor="middle" font-size="11" fill="#475569">2022</text>

  <!-- 2023 -->
  <rect x="265" y="239" width="55" height="41" fill="#0176d3" rx="3"/>
  <text x="292" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#0176d3">~35K</text>
  <text x="292" y="300" text-anchor="middle" font-size="11" fill="#475569">2023</text>

  <!-- 2024 -->
  <rect x="345" y="228" width="55" height="52" fill="#0176d3" rx="3"/>
  <text x="372" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#0176d3">45K</text>
  <text x="372" y="300" text-anchor="middle" font-size="11" fill="#475569">2024</text>

  <!-- 2025 -->
  <rect x="425" y="234" width="55" height="46" fill="#0176d3" rx="3"/>
  <text x="452" y="229" text-anchor="middle" font-size="11" font-weight="bold" fill="#0176d3">40K+</text>
  <text x="452" y="300" text-anchor="middle" font-size="11" fill="#475569">2025</text>

  <!-- 2026 (projected) -->
  <rect x="505" y="228" width="55" height="52" fill="#14b8a6" rx="3" opacity="0.8"/>
  <text x="532" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#14b8a6">40K+</text>
  <text x="532" y="300" text-anchor="middle" font-size="11" fill="#475569">2026*</text>

  <!-- Legend -->
  <rect x="380" y="320" width="12" height="12" fill="#14b8a6" rx="2" opacity="0.8"/>
  <text x="396" y="331" font-size="11" fill="#64748b">* Projected</text>

  <text x="300" y="340" text-anchor="middle" font-size="10" fill="#94a3b8">Sources: SF Examiner, ABC7, Salesforce</text>
</svg>
