<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, sans-serif">
  <rect width="600" height="350" fill="#f8f9fa" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Gamescom Attendance Growth (2022-2025)</text>

  <!-- Y axis -->
  <line x1="80" y1="50" x2="80" y2="280" stroke="#ccc" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="280" x2="540" y2="280" stroke="#ccc" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="70" y="285" text-anchor="end" font-size="11" fill="#666">0</text>
  <text x="70" y="223" text-anchor="end" font-size="11" fill="#666">100K</text>
  <text x="70" y="162" text-anchor="end" font-size="11" fill="#666">200K</text>
  <text x="70" y="100" text-anchor="end" font-size="11" fill="#666">300K</text>
  <text x="70" y="55" text-anchor="end" font-size="11" fill="#666">400K</text>

  <!-- Grid lines -->
  <line x1="80" y1="220" x2="540" y2="220" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="160" x2="540" y2="160" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="100" x2="540" y2="100" stroke="#eee" stroke-width="1"/>

  <!-- Bars: 2022=265K, 2023=320K, 2024=335K, 2025=357K -->
  <!-- Bar 2022: 265/400 * 230 = 152.375 -->
  <rect x="115" y="127.6" width="80" height="152.4" fill="#6c5ce7" rx="4"/>
  <text x="155" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c5ce7">265K</text>
  <text x="155" y="300" text-anchor="middle" font-size="12" fill="#333">2022</text>

  <!-- Bar 2023: 320/400 * 230 = 184 -->
  <rect x="230" y="96" width="80" height="184" fill="#a29bfe" rx="4"/>
  <text x="270" y="89" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c5ce7">320K</text>
  <text x="270" y="300" text-anchor="middle" font-size="12" fill="#333">2023</text>

  <!-- Bar 2024: 335/400 * 230 = 192.625 -->
  <rect x="345" y="87.4" width="80" height="192.6" fill="#7c6ff7" rx="4"/>
  <text x="385" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c5ce7">335K</text>
  <text x="385" y="300" text-anchor="middle" font-size="12" fill="#333">2024</text>

  <!-- Bar 2025: 357/400 * 230 = 204.975 -->
  <rect x="460" y="75" width="80" height="205" fill="#5b4cdb" rx="4"/>
  <text x="500" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b4cdb">357K</text>
  <text x="500" y="300" text-anchor="middle" font-size="12" fill="#333">2025</text>

  <!-- Source -->
  <text x="300" y="335" text-anchor="middle" font-size="10" fill="#999">Source: gamescom.global official reports</text>
</svg>