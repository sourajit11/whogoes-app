<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="350" fill="#f8fafc"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">LEAP Conference Attendance Growth (2022-2026)</text>

  <!-- Y-axis -->
  <line x1="80" y1="50" x2="80" y2="280" stroke="#cbd5e1" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="80" y1="280" x2="560" y2="280" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="70" y="280" text-anchor="end" font-size="11" fill="#64748b">0</text>
  <text x="70" y="222" text-anchor="end" font-size="11" fill="#64748b">50K</text>
  <text x="70" y="165" text-anchor="end" font-size="11" fill="#64748b">100K</text>
  <text x="70" y="107" text-anchor="end" font-size="11" fill="#64748b">150K</text>
  <text x="70" y="55" text-anchor="end" font-size="11" fill="#64748b">200K</text>

  <!-- Grid lines -->
  <line x1="80" y1="222" x2="560" y2="222" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="165" x2="560" y2="165" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="107" x2="560" y2="107" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="55" x2="560" y2="55" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Bars: 2022: 100K, 2023: 172K, 2024: 215K (est), 2025: 201K, 2026: 201K+ (projected) -->
  <!-- 2022: 100K -->
  <rect x="110" y="165" width="70" height="115" fill="#6366f1" rx="4"/>
  <text x="145" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">100K</text>
  <text x="145" y="300" text-anchor="middle" font-size="12" fill="#475569">2022</text>

  <!-- 2023: 172K -->
  <rect x="210" y="83" width="70" height="197" fill="#6366f1" rx="4"/>
  <text x="245" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">172K</text>
  <text x="245" y="300" text-anchor="middle" font-size="12" fill="#475569">2023</text>

  <!-- 2024: 215K -->
  <rect x="310" y="33" width="70" height="247" fill="#6366f1" rx="4"/>
  <text x="345" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">215K</text>
  <text x="345" y="300" text-anchor="middle" font-size="12" fill="#475569">2024</text>

  <!-- 2025: 201K -->
  <rect x="410" y="49" width="70" height="231" fill="#6366f1" rx="4"/>
  <text x="445" y="41" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">201K</text>
  <text x="445" y="300" text-anchor="middle" font-size="12" fill="#475569">2025</text>

  <!-- 2026: 201K+ (projected) -->
  <rect x="510" y="49" width="70" height="231" fill="#a5b4fc" rx="4" stroke="#6366f1" stroke-width="1" stroke-dasharray="4"/>
  <text x="545" y="41" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">201K+</text>
  <text x="545" y="300" text-anchor="middle" font-size="12" fill="#475569">2026*</text>

  <!-- Legend -->
  <rect x="400" y="320" width="12" height="12" fill="#a5b4fc" stroke="#6366f1" stroke-width="1" stroke-dasharray="2" rx="2"/>
  <text x="418" y="331" font-size="11" fill="#64748b">* Projected</text>

  <!-- Source -->
  <text x="300" y="345" text-anchor="middle" font-size="10" fill="#94a3b8">Source: LEAP organizer data, Informa</text>
</svg>
