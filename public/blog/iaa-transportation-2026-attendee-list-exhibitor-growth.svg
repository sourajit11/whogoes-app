<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="Inter, system-ui, sans-serif">
  <rect width="600" height="360" fill="#f8fafc" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">IAA Transportation Exhibitor Growth</text>
  <text x="300" y="48" text-anchor="middle" font-size="11" fill="#64748b">Number of exhibitors per edition (Source: VDA / IAA official data)</text>

  <!-- Y axis -->
  <line x1="80" y1="70" x2="80" y2="300" stroke="#cbd5e1" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="300" x2="560" y2="300" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="72" y="304" text-anchor="end" font-size="10" fill="#64748b">0</text>
  <text x="72" y="258" text-anchor="end" font-size="10" fill="#64748b">500</text>
  <text x="72" y="212" text-anchor="end" font-size="10" fill="#64748b">1,000</text>
  <text x="72" y="166" text-anchor="end" font-size="10" fill="#64748b">1,500</text>
  <text x="72" y="120" text-anchor="end" font-size="10" fill="#64748b">2,000</text>

  <!-- Grid lines -->
  <line x1="80" y1="254" x2="560" y2="254" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="208" x2="560" y2="208" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="162" x2="560" y2="162" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="116" x2="560" y2="116" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Bars: 2018 (~2,174), 2022 (~1,400), 2024 (~1,700), 2026 (~1,700+ projected) -->
  <!-- Scale: 300px height = 2000 exhibitors, so 1 exhibitor = 0.115px -->
  <!-- 2018: height = 2174 * 0.115 = 250 => y = 300-250 = 50... let's recalc -->
  <!-- Max Y range 70-300 = 230px for 2000 exhibitors => 1 exhibitor = 0.115px -->

  <!-- 2018: ~2,174 exhibitors (IAA Commercial Vehicles Hannover) -->
  <!-- height: 2174/2000 * 230 = 250 => capped, let's use 2500 max -->
  <!-- Rescale: 230px for 2500 => 0.092px per exhibitor -->
  <!-- 2018: 2174 * 0.092 = 200 => y = 300-200 = 100 -->
  <rect x="120" y="100" width="70" height="200" fill="#94a3b8" rx="3"/>
  <text x="155" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">2,174</text>
  <text x="155" y="320" text-anchor="middle" font-size="11" fill="#475569">2018</text>

  <!-- 2022: ~1,400 exhibitors -->
  <!-- 1400 * 0.092 = 128.8 => y = 300-129 = 171 -->
  <rect x="240" y="171" width="70" height="129" fill="#94a3b8" rx="3"/>
  <text x="275" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">1,400</text>
  <text x="275" y="320" text-anchor="middle" font-size="11" fill="#475569">2022</text>

  <!-- 2024: ~1,700 exhibitors -->
  <!-- 1700 * 0.092 = 156.4 => y = 300-156 = 144 -->
  <rect x="360" y="144" width="70" height="156" fill="#3b82f6" rx="3"/>
  <text x="395" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">1,700</text>
  <text x="395" y="320" text-anchor="middle" font-size="11" fill="#475569">2024</text>

  <!-- 2026: projected ~1,900 (11% increase) -->
  <!-- 1900 * 0.092 = 174.8 => y = 300-175 = 125 -->
  <rect x="480" y="125" width="70" height="175" fill="#2563eb" rx="3"/>
  <text x="515" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">~1,900</text>
  <text x="515" y="320" text-anchor="middle" font-size="11" fill="#475569">2026 (est.)</text>

  <text x="300" y="350" text-anchor="middle" font-size="10" fill="#94a3b8">2022 was the first post-pandemic edition. 2026 registrations are tracking 11% ahead of the 2024 pace.</text>
</svg>
