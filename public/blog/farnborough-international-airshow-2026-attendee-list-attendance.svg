<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, sans-serif">
  <rect width="600" height="350" fill="#f8fafc" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Farnborough Airshow Attendance &amp; Exhibitors (2012-2026)</text>

  <!-- Y-axis labels (attendees in thousands) -->
  <text x="45" y="75" text-anchor="end" font-size="11" fill="#64748b">100K</text>
  <text x="45" y="125" text-anchor="end" font-size="11" fill="#64748b">80K</text>
  <text x="45" y="175" text-anchor="end" font-size="11" fill="#64748b">60K</text>
  <text x="45" y="225" text-anchor="end" font-size="11" fill="#64748b">40K</text>
  <text x="45" y="275" text-anchor="end" font-size="11" fill="#64748b">20K</text>

  <!-- Grid lines -->
  <line x1="55" y1="70" x2="570" y2="70" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="55" y1="120" x2="570" y2="120" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="55" y1="170" x2="570" y2="170" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="55" y1="220" x2="570" y2="220" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="55" y1="270" x2="570" y2="270" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Baseline -->
  <line x1="55" y1="290" x2="570" y2="290" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 2012: 209K visitors (but trade-only ~80K est), 1,506 exhibitors -->
  <!-- Using trade visitor approximation for consistency -->
  <!-- Bars: Attendees (blue) and Exhibitors scaled (teal) -->

  <!-- 2012: ~80K trade visitors, 1506 exhibitors -->
  <rect x="80" y="120" width="40" height="170" fill="#3b82f6" rx="3"/>
  <text x="100" y="112" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">80K</text>
  <rect x="122" y="157" width="40" height="133" fill="#14b8a6" rx="3"/>
  <text x="142" y="149" text-anchor="middle" font-size="10" fill="#14b8a6" font-weight="600">1,506</text>
  <text x="111" y="308" text-anchor="middle" font-size="12" fill="#475569">2012</text>

  <!-- 2018: 80K visitors, 1500 exhibitors -->
  <rect x="200" y="120" width="40" height="170" fill="#3b82f6" rx="3"/>
  <text x="220" y="112" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">80K</text>
  <rect x="242" y="159" width="40" height="131" fill="#14b8a6" rx="3"/>
  <text x="262" y="151" text-anchor="middle" font-size="10" fill="#14b8a6" font-weight="600">1,500</text>
  <text x="231" y="308" text-anchor="middle" font-size="12" fill="#475569">2018</text>

  <!-- 2024: 100,358 total visitors, 1500 exhibitors -->
  <rect x="320" y="80" width="40" height="210" fill="#3b82f6" rx="3"/>
  <text x="340" y="72" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">100K</text>
  <rect x="362" y="159" width="40" height="131" fill="#14b8a6" rx="3"/>
  <text x="382" y="151" text-anchor="middle" font-size="10" fill="#14b8a6" font-weight="600">1,500</text>
  <text x="351" y="308" text-anchor="middle" font-size="12" fill="#475569">2024</text>

  <!-- 2026: ~100K expected (matching record 2024), 1500+ exhibitors (projected) -->
  <rect x="440" y="80" width="40" height="210" fill="#3b82f6" rx="3" opacity="0.5" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="460" y="72" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">~100K*</text>
  <rect x="482" y="159" width="40" height="131" fill="#14b8a6" rx="3" opacity="0.5" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="502" y="151" text-anchor="middle" font-size="10" fill="#14b8a6" font-weight="600">1,500+</text>
  <text x="471" y="308" text-anchor="middle" font-size="12" fill="#475569">2026*</text>

  <!-- Legend -->
  <rect x="170" y="330" width="12" height="12" fill="#3b82f6" rx="2"/>
  <text x="186" y="341" font-size="11" fill="#475569">Total Visitors</text>
  <rect x="310" y="330" width="12" height="12" fill="#14b8a6" rx="2"/>
  <text x="326" y="341" font-size="11" fill="#475569">Exhibitors</text>
  <text x="455" y="341" font-size="10" fill="#94a3b8">*2026 projected</text>
</svg>
