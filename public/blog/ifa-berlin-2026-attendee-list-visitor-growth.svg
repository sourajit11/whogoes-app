<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="350" fill="#ffffff" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">IFA Berlin Visitor Attendance (2019-2026)</text>

  <!-- Y-axis labels -->
  <text x="55" y="80" text-anchor="end" font-size="11" fill="#666">250K</text>
  <text x="55" y="130" text-anchor="end" font-size="11" fill="#666">200K</text>
  <text x="55" y="180" text-anchor="end" font-size="11" fill="#666">150K</text>
  <text x="55" y="230" text-anchor="end" font-size="11" fill="#666">100K</text>
  <text x="55" y="280" text-anchor="end" font-size="11" fill="#666">50K</text>

  <!-- Grid lines -->
  <line x1="65" y1="75" x2="570" y2="75" stroke="#eee" stroke-width="1"/>
  <line x1="65" y1="125" x2="570" y2="125" stroke="#eee" stroke-width="1"/>
  <line x1="65" y1="175" x2="570" y2="175" stroke="#eee" stroke-width="1"/>
  <line x1="65" y1="225" x2="570" y2="225" stroke="#eee" stroke-width="1"/>
  <line x1="65" y1="275" x2="570" y2="275" stroke="#eee" stroke-width="1"/>

  <!-- Baseline -->
  <line x1="65" y1="300" x2="570" y2="300" stroke="#333" stroke-width="1.5"/>

  <!-- Bars: scale: 0 at y=300, 250K at y=75, so 1K = 0.9px -->
  <!-- 2019: 245,000 => height=220.5, y=79.5 -->
  <rect x="100" y="79" width="70" height="221" fill="#6366f1" rx="4"/>
  <text x="135" y="73" text-anchor="middle" font-size="11" font-weight="bold" fill="#6366f1">245K</text>
  <text x="135" y="318" text-anchor="middle" font-size="12" fill="#333">2019</text>

  <!-- 2022: 161,000 => height=144.9, y=155.1 (IFA returned after COVID) -->
  <rect x="210" y="155" width="70" height="145" fill="#6366f1" rx="4"/>
  <text x="245" y="149" text-anchor="middle" font-size="11" font-weight="bold" fill="#6366f1">161K</text>
  <text x="245" y="318" text-anchor="middle" font-size="12" fill="#333">2022</text>

  <!-- 2023: 182,000 => height=163.8, y=136.2 -->
  <rect x="320" y="136" width="70" height="164" fill="#6366f1" rx="4"/>
  <text x="355" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#6366f1">182K</text>
  <text x="355" y="318" text-anchor="middle" font-size="12" fill="#333">2023</text>

  <!-- 2024: 188,000 => height=169.2, y=130.8 -->
  <rect x="430" y="131" width="70" height="169" fill="#6366f1" rx="4"/>
  <text x="465" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#6366f1">188K</text>
  <text x="465" y="318" text-anchor="middle" font-size="12" fill="#333">2024</text>

  <!-- 2026: 200,000+ => height=180, y=120 (projected, dashed border) -->
  <rect x="540" y="120" width="70" height="180" fill="#a5b4fc" rx="4" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="575" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#6366f1">200K+</text>
  <text x="575" y="318" text-anchor="middle" font-size="12" fill="#333">2026*</text>

  <!-- Legend -->
  <text x="300" y="345" text-anchor="middle" font-size="10" fill="#999">*2026 figure is organizer projection. Source: IFA Berlin / Messe Berlin</text>
</svg>
